repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: src/pyclaw/
        additional_dependencies: [types-requests, types-setuptools, types-PyYAML]
  - repo: local
    hooks:
      - id: security-check
        name: security check
        entry: scripts/check_secrets.py
        language: script
        files: \.(py|json|yaml|yml|toml|md)$
        exclude: __pycache__|\.pyc$|node_modules/