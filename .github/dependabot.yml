version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "Etc/UTC"
    target-branch: "master"
    groups:
      production:
        patterns: ["*"]
        exclude-patterns: ["pytest*", "ruff", "mypy"]
      development:
        patterns: ["pytest*", "ruff", "mypy"]
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "automated"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:30"
      timezone: "Etc/UTC"
    target-branch: "master"
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci"
    labels:
      - "ci"
      - "automated"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Etc/UTC"
    target-branch: "master"
    groups:
      docker-base-images:
        patterns: ["*"]
    labels:
      - "docker"
      - "automated"
    open-pull-requests-limit: 5
    rebase-strategy: "auto"
    ignore:
      - dependency-name: "python"
        versions: [">=3.14"]
