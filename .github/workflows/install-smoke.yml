name: Install Smoke Test

on:
  workflow_dispatch:
  # push:
  #   branches: [master]
  #   paths:
  #     - "scripts/install.*"
  #     - "pyproject.toml"
  #     - "Dockerfile"
  #     - "docker-compose.yml"
  # pull_request:
  #   branches: [master]
  #   paths:
  #     - "scripts/install.*"
  #     - "pyproject.toml"
  #     - "Dockerfile"
  #     - "docker-compose.yml"

permissions:
  contents: read

concurrency:
  group: smoke-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pip-install:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install from source
        run: pip install .

      - name: Verify CLI
        run: |
          pyclaw --version
          pyclaw --help

  pipx-install:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install via pipx
        run: |
          pip install pipx
          pipx install .

      - name: Verify CLI
        run: |
          pyclaw --version
          pyclaw --help

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t pyclaw-smoke .

      - name: Run smoke test
        run: |
          docker run --rm pyclaw-smoke --version
          docker run --rm pyclaw-smoke --help

  install-script:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Test install.sh (from source)
        run: |
          chmod +x scripts/install.sh
          bash scripts/install.sh --from-source

      - name: Verify installation
        run: |
          pyclaw --version || python3 -m pyclaw --version
