name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  PYCLAW_CACHE_ROOT: /tmp/openclaw-py-cache
  RUFF_CACHE_DIR: /tmp/openclaw-py-cache/ruff
  MYPY_CACHE_DIR: /tmp/openclaw-py-cache/mypy
  PYTEST_CACHE_DIR: /tmp/openclaw-py-cache/pytest
  PYTEST_ADDOPTS: -o cache_dir=/tmp/openclaw-py-cache/pytest

jobs:
  # ── Preflight: lint + test + build ────────────────────────────────
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.13-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.13-

      - name: Install and verify
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,ui]"

      - name: Lint
        run: |
          rm -rf "$RUFF_CACHE_DIR"
          ruff format --check src tests
          ruff check src tests

      - name: Type check
        run: |
          rm -rf "$MYPY_CACHE_DIR"
          mypy src/pyclaw

      - name: Test
        run: |
          rm -rf "$PYTEST_CACHE_DIR"
          pytest tests/

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Verify package
        run: |
          pip install dist/*.whl
          pyclaw --version

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  # ── GitHub Release ────────────────────────────────────────────────
  release-notes:
    runs-on: ubuntu-latest
    needs: preflight
    permissions:
      contents: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release notes
        run: |
          chmod +x scripts/generate-release-notes.sh
          ./scripts/generate-release-notes.sh > RELEASE_NOTES.md

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          draft: false
          files: dist/*

  # ── TestPyPI (smoke test) ─────────────────────────────────────────
  # Requires Trusted Publisher on https://test.pypi.org/manage/account/publishing/
  publish-testpypi:
    runs-on: ubuntu-latest
    needs: preflight
    continue-on-error: true
    environment: testpypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Verify install from TestPyPI
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Waiting for TestPyPI to index version ${VERSION}..."
          sleep 30
          pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ "openclaw-py==${VERSION}" || echo "TestPyPI verification skipped (package not yet indexed)"

  # ── PyPI Publish ──────────────────────────────────────────────────
  # Requires Trusted Publisher on https://pypi.org/manage/account/publishing/
  publish-pypi:
    runs-on: ubuntu-latest
    needs: [preflight, release-notes]
    continue-on-error: true
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ── Docker Publish ────────────────────────────────────────────────
  publish-docker:
    runs-on: ubuntu-latest
    needs: [preflight, release-notes]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pyclaw
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
