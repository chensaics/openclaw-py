name: PR Label Automation

on:
  workflow_dispatch:
  # pull_request_target:
  #   types: [opened]

permissions:
  pull-requests: write
  issues: write

jobs:
  add-needs-review-label:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Ensure label exists and apply
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const labelName = "needs-review";

            try {
              await github.rest.issues.getLabel({
                owner,
                repo,
                name: labelName,
              });
            } catch (error) {
              if (error.status === 404) {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: labelName,
                  color: "0e8a16",
                  description: "Initial review is required",
                });
              } else {
                throw error;
              }
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: context.issue.number,
              labels: [labelName],
            });
