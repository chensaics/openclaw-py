name: Pre-commit

on:
  push:
    branches: [master]
    paths-ignore:
      - "docs/reference/**"
      - "docs/**/*.md"
      - "LICENSE"
  pull_request:
    branches: [master]
    paths-ignore:
      - "docs/reference/**"
      - "docs/**/*.md"
      - "LICENSE"

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Run pre-commit checks
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit
          pre-commit run --all-files
