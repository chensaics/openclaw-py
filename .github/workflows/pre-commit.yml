name: Pre-commit

on:
  push:
    branches: [master]
    paths-ignore:
      - "docs/reference/**"
      - "docs/**/*.md"
      - "LICENSE"
  pull_request:
    branches: [master]
    paths-ignore:
      - "docs/reference/**"
      - "docs/**/*.md"
      - "LICENSE"

permissions:
  contents: read

env:
  PYCLAW_CACHE_ROOT: /tmp/openclaw-py-cache
  RUFF_CACHE_DIR: /tmp/openclaw-py-cache/ruff
  MYPY_CACHE_DIR: /tmp/openclaw-py-cache/mypy
  PYTEST_CACHE_DIR: /tmp/openclaw-py-cache/pytest
  PYTEST_ADDOPTS: -o cache_dir=/tmp/openclaw-py-cache/pytest
  PRE_COMMIT_HOME: /tmp/openclaw-py-cache/pre-commit

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Run pre-commit checks
        run: |
          rm -rf "$RUFF_CACHE_DIR" "$MYPY_CACHE_DIR" "$PYTEST_CACHE_DIR" "$PRE_COMMIT_HOME"
          python -m pip install --upgrade pip
          pip install pre-commit
          pre-commit run --all-files
